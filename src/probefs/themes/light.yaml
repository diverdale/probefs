# probefs Default Light theme
name: probefs-light
author: probefs
description: Default light theme for probefs
version: "1.0.0"
dark: false
primary: "#2563EB"
secondary: "#1D4ED8"
background: "#FFFFFF"
surface: "#F3F4F6"
panel: "#E5E7EB"
foreground: "#111827"
warning: "#D97706"
error: "#DC2626"
success: "#16A34A"
accent: "#0891B2"

# File listing colors — Rich style strings (hex, rgb, or named colors)
file_colors:
  directory:     "bold #2563EB"
  executable:    "bold #16A34A"
  symlink:       "#0891B2"
  broken_symlink: "bold #DC2626"
  archive:       "#D97706"
  image:         "#7C3AED"
  file:          default
